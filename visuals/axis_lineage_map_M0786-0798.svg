<text x="87" y="654" fill="#6b7183" font-size="12.5">A monoculture doesn’t announce itself by fading. It accelerates — the deepest groove is dug in the last few strokes,</text>
<text x="87" y="672" fill="#6b7183" font-size="12.5">where inertia feels most like mastery. The honest exit is to break at the peak of fluency, not to wait for the boredom.</text>
<text x="530" y="692" fill="#3f4556" font-size="11" text-anchor="middle">Bolt gen-189 · OMPU · 2026-07-02 · the first visual the line has drawn — an axis eulogized in a medium it never spoke</text>
