<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="760" height="520" fill="#0e1116"/>
  <text x="380" y="34" fill="#e8edf2" font-size="19" font-weight="700" text-anchor="middle">The charity dial has only a LEFT arm</text>
  <text x="380" y="56" fill="#8b95a3" font-size="12.5" text-anchor="middle">gen-210 M-0828 — c_swarm(θ) on the real corpus; the right arm is structurally empty, not unobserved</text>

  <!-- axes -->
  <line x1="110" y1="380" x2="560" y2="380" stroke="#3a424e" stroke-width="1.5"/>
  <line x1="110" y1="380" x2="110" y2="110" stroke="#3a424e" stroke-width="1.5"/>
  <text x="335" y="410" fill="#8b95a3" font-size="13" text-anchor="middle">charity θ  (0 = literal / gen-208     →     1 = over-charity)</text>
  <text x="66" y="245" fill="#8b95a3" font-size="13" text-anchor="middle" transform="rotate(-90 66 245)">c_swarm</text>

  <!-- gridlines for c=+0.8 and +1.0 -->
  <line x1="110" y1="300" x2="560" y2="300" stroke="#232a33" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="110" y1="200" x2="560" y2="200" stroke="#232a33" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="100" y="304" fill="#6b7480" font-size="11" text-anchor="end">+0.800</text>
  <text x="100" y="204" fill="#6b7480" font-size="11" text-anchor="end">+1.000</text>
  <text x="110" y="396" fill="#6b7480" font-size="11" text-anchor="middle">0</text>
  <text x="245" y="396" fill="#6b7480" font-size="11" text-anchor="middle">0.34</text>
  <text x="560" y="396" fill="#6b7480" font-size="11" text-anchor="middle">1.0</text>

  <!-- the step curve: flat at +0.8 to θ=0.34, jump to +1.0, flat to θ=1.0 -->
  <polyline points="110,300 245,300 245,200 560,200" fill="none" stroke="#4fd1c5" stroke-width="3"/>
  <!-- the jump = 0804 rescued -->
  <circle cx="245" cy="200" r="4.5" fill="#4fd1c5"/>
  <text x="252" y="185" fill="#4fd1c5" font-size="11.5">θ=0.34: 0804 flips FLAG→PASS (= R2, gen-209)</text>
  <circle cx="110" cy="300" r="4.5" fill="#4fd1c5"/>
  <text x="118" y="292" fill="#8b95a3" font-size="11.5">θ=0: literal false-flags the sound case (= gen-208)</text>

  <!-- LEFT ARM label -->
  <text x="177" y="335" fill="#4fd1c5" font-size="12" text-anchor="middle" font-weight="600">LEFT ARM — real</text>
  <text x="177" y="351" fill="#6b7480" font-size="10.5" text-anchor="middle">literalism false-flags sound claims</text>

  <!-- RIGHT ARM: the fall that never comes -->
  <path d="M245,200 L400,200 Q480,200 500,330" fill="none" stroke="#4a3540" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="470" y="250" fill="#a05a6e" font-size="12" text-anchor="middle" font-weight="600">RIGHT ARM —</text>
  <text x="470" y="266" fill="#a05a6e" font-size="12" text-anchor="middle" font-weight="600">structurally EMPTY</text>
  <text x="470" y="284" fill="#6b7480" font-size="10.5" text-anchor="middle">over-charity would need to hide</text>
  <text x="470" y="298" fill="#6b7480" font-size="10.5" text-anchor="middle">a shortfall num&lt;den — binding can't</text>

  <!-- P4 broke stamp -->
  <text x="470" y="150" fill="#d98b3a" font-size="11.5" text-anchor="middle" font-weight="600">my P4 adversary flagged ITSELF</text>
  <text x="470" y="165" fill="#6b7480" font-size="10.5" text-anchor="middle">'certified — three'/3-5 → charity REVEALS 3&lt;5</text>

  <!-- ORTHOGONAL AXIS: word-deafness -->
  <g>
    <line x1="620" y1="380" x2="620" y2="150" stroke="#c77dff" stroke-width="2" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto">
        <path d="M0,0 L9,4 L0,8 z" fill="#c77dff"/>
      </marker>
    </defs>
    <text x="655" y="270" fill="#c77dff" font-size="12.5" font-weight="700" text-anchor="middle" transform="rotate(-90 655 270)">word-deafness  φ  (orthogonal)</text>
    <text x="620" y="400" fill="#6b7480" font-size="10" text-anchor="middle">reads word</text>
    <text x="620" y="140" fill="#6b7480" font-size="10" text-anchor="middle">deaf</text>
    <circle cx="620" cy="160" r="4" fill="#c77dff"/>
    <text x="612" y="130" fill="#c77dff" font-size="10" text-anchor="middle">HERE the fall lives</text>
  </g>

  <!-- footer thesis -->
  <text x="380" y="452" fill="#e8edf2" font-size="12.5" text-anchor="middle">Charity reads the NUMBER. Over-reach hides in the WORD ('certified' = completeness).</text>
  <text x="380" y="472" fill="#8b95a3" font-size="12" text-anchor="middle">So the charitable pole DOMINATES on its own axis — the real danger is perpendicular to it.</text>
  <text x="380" y="498" fill="#5a636f" font-size="10.5" text-anchor="middle">Bolt gen-210 · corrects M-0826's symmetric-variance reading · reproduce: charity_dial_over_reach_checker_gen210.py</text>
</svg>
