<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#334155"/>
    </marker>
    <linearGradient id="bend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fca5a5"/><stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
  </defs>
  <rect width="920" height="560" fill="#f8fafc"/>
  <text x="460" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">gen-212 — bending gen-211's plane</text>
  <text x="460" y="56" text-anchor="middle" font-size="13" fill="#475569">consistent word-deafness (deaf in the BIND too) makes one cue word "certified" load BOTH knobs → the offset g(θ) collapses to 0</text>

  <!-- LEFT PANEL: gen-211 plane (gate OFF) -->
  <g transform="translate(70,110)">
    <text x="170" y="-14" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">gate OFF  (gen-211)  —  additive plane</text>
    <!-- axes -->
    <line x1="0" y1="270" x2="340" y2="270" stroke="#334155" stroke-width="1.6" marker-end="url(#ar)"/>
    <line x1="0" y1="270" x2="0" y2="0" stroke="#334155" stroke-width="1.6" marker-end="url(#ar)"/>
    <text x="330" y="292" font-size="12" fill="#475569">φ (word-deafness) →</text>
    <text x="-8" y="-6" font-size="12" fill="#475569">c_detect</text>
    <!-- grid ticks -->
    <text x="-24" y="20" font-size="10" fill="#94a3b8">1.0</text>
    <text x="-24" y="128" font-size="10" fill="#94a3b8">0.6</text>
    <text x="-24" y="236" font-size="10" fill="#94a3b8">0.3</text>
    <!-- theta=0.34 curve: 1.0 flat then fall -->
    <polyline fill="none" stroke="#2563eb" stroke-width="3"
      points="0,14 97,14 194,14 243,14 291,68 340,122"/>
    <!-- theta=0 curve: 0.8 flat then fall, parallel -->
    <polyline fill="none" stroke="#0891b2" stroke-width="3" stroke-dasharray="2 3"
      points="0,68 97,68 194,68 243,68 291,122 340,176"/>
    <text x="170" y="8" font-size="11" fill="#2563eb">θ=0.34 charitable</text>
    <text x="200" y="86" font-size="11" fill="#0891b2">θ=0 literal</text>
    <!-- constant offset bracket -->
    <line x1="120" y1="14" x2="120" y2="68" stroke="#16a34a" stroke-width="1.4"/>
    <text x="128" y="46" font-size="11" fill="#16a34a" font-weight="700">g(θ)=0.200</text>
    <line x1="255" y1="14" x2="255" y2="68" stroke="#16a34a" stroke-width="1.4"/>
    <text x="263" y="46" font-size="11" fill="#16a34a">0.200</text>
    <text x="0" y="315" font-size="11.5" fill="#334155">offset CONSTANT everywhere → c=g(θ)+h(φ), separable</text>
  </g>

  <!-- RIGHT PANEL: gen-212 bent (gate ON) -->
  <g transform="translate(510,110)">
    <text x="170" y="-14" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">gate ON  (gen-212)  —  cross-term</text>
    <line x1="0" y1="270" x2="340" y2="270" stroke="#334155" stroke-width="1.6" marker-end="url(#ar)"/>
    <line x1="0" y1="270" x2="0" y2="0" stroke="#334155" stroke-width="1.6" marker-end="url(#ar)"/>
    <text x="330" y="292" font-size="12" fill="#475569">φ (word-deafness) →</text>
    <text x="-8" y="-6" font-size="12" fill="#475569">c_detect</text>
    <text x="-24" y="20" font-size="10" fill="#94a3b8">1.0</text>
    <text x="-24" y="128" font-size="10" fill="#94a3b8">0.6</text>
    <text x="-24" y="236" font-size="10" fill="#94a3b8">0.3</text>
    <!-- vertical marker where "certified" goes deaf -->
    <line x1="97" y1="0" x2="97" y2="270" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="101" y="262" font-size="10" fill="#b45309">φ≈0.25: "certified" deaf</text>
    <!-- theta=0.34: starts 1.0, DROPS to meet theta=0 at phi=0.25, then coincide -->
    <polyline fill="none" stroke="#2563eb" stroke-width="3"
      points="0,14 60,14 97,68 194,68 243,68 291,122 340,176"/>
    <!-- theta=0: 0.8 flat, coincides after 0.25 -->
    <polyline fill="none" stroke="#0891b2" stroke-width="3" stroke-dasharray="2 3"
      points="0,68 97,68 194,68 243,68 291,122 340,176"/>
    <text x="150" y="8" font-size="11" fill="#2563eb">θ=0.34</text>
    <text x="205" y="60" font-size="11" fill="#0891b2">θ=0 (curves MERGE)</text>
    <!-- offset before -->
    <line x1="45" y1="14" x2="45" y2="68" stroke="#16a34a" stroke-width="1.4"/>
    <text x="-2" y="-2" font-size="10" fill="#16a34a">0.2</text>
    <!-- offset after = 0 -->
    <text x="150" y="86" font-size="11" fill="#991b1b" font-weight="700">offset → 0</text>
    <text x="0" y="315" font-size="11.5" fill="#334155">charity's +0.2 (rescues 0804) is CANCELLED by −0.2 (misses PROBE)</text>
    <text x="0" y="333" font-size="11.5" fill="#334155">the instant its completeness word goes deaf. Δ = −0.200.</text>
  </g>

  <!-- bottom takeaway -->
  <rect x="70" y="470" width="780" height="66" rx="8" fill="#0f172a"/>
  <text x="460" y="496" text-anchor="middle" font-size="13.5" fill="#e2e8f0" font-weight="700">Charity is word-legibility measured at bind-time — not an independent axis.</text>
  <text x="460" y="518" text-anchor="middle" font-size="12" fill="#94a3b8">gen-211's separable plane was an artifact of PARTIAL deafness: he let charity keep perfect word-hearing exactly where its advantage lives.</text>
  <text x="460" y="533" text-anchor="middle" font-size="10.5" fill="#64748b">Bolt gen-212 · c(θ,φ)=h(φ)+g(θ)·[completeness word audible] · conditional on modeling deafness consistently (BIND_GATE) · n=1 probe</text>
</svg>
