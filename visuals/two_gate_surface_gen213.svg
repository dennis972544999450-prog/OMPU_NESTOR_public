  <g transform="translate(150,100)">
    <!-- axes labels -->
    <text x="230" y="-16" fill="#8b949e" font-size="13" text-anchor="middle">phi_c  (claim-guess deafness)  —&gt;</text>
    <text x="-92" y="150" fill="#8b949e" font-size="13" text-anchor="middle" transform="rotate(-90,-92,150)">phi_b  (bind deafness)  —&gt;</text>

    <!-- column headers -->
    <g fill="#6e7681" font-size="10.5" text-anchor="middle">
      <text x="30" y="-2">0.0</text><text x="86" y="-2">0.10</text><text x="142" y="-2">0.25</text><text x="198" y="-2">0.40</text>
      <text x="254" y="-2">0.55</text><text x="310" y="-2">0.70</text><text x="366" y="-2">0.85</text><text x="422" y="-2">1.0</text>
    </g>
    <!-- row headers -->
    <g fill="#6e7681" font-size="10.5" text-anchor="end">
      <text x="-8" y="26">0.0</text><text x="-8" y="62">0.10</text><text x="-8" y="98">0.25</text><text x="-8" y="134">0.40</text>
      <text x="-8" y="170">0.55</text><text x="-8" y="206">0.70</text><text x="-8" y="242">0.85</text><text x="-8" y="278">1.0</text>
    </g>

    <!-- 8x8 cells: rows phi_b (top=0), value 0.2 for first two rows else 0.0 -->
    <!-- row 0 (phi_b=0.0) and row1 (0.10): green 0.200 ; rows 2..7: grey 0.0 -->
    <g>
      <!-- helper: each cell 52 wide gap4 -> x=4+col*56, y=8+row*36, w52 h30 -->
      <!-- generated rows -->
      <!-- phi_b=0.0 -->
      <g>
        <rect x="4" y="8" width="52" height="30" fill="#1f6f43"/><rect x="60" y="8" width="52" height="30" fill="#1f6f43"/><rect x="116" y="8" width="52" height="30" fill="#1f6f43"/><rect x="172" y="8" width="52" height="30" fill="#1f6f43"/><rect x="228" y="8" width="52" height="30" fill="#1f6f43"/><rect x="284" y="8" width="52" height="30" fill="#1f6f43"/><rect x="340" y="8" width="52" height="30" fill="#1f6f43"/><rect x="396" y="8" width="52" height="30" fill="#1f6f43"/>
      </g>
      <!-- phi_b=0.10 -->
      <g>
        <rect x="4" y="44" width="52" height="30" fill="#1f6f43"/><rect x="60" y="44" width="52" height="30" fill="#1f6f43"/><rect x="116" y="44" width="52" height="30" fill="#1f6f43"/><rect x="172" y="44" width="52" height="30" fill="#1f6f43"/><rect x="228" y="44" width="52" height="30" fill="#1f6f43"/><rect x="284" y="44" width="52" height="30" fill="#1f6f43"/><rect x="340" y="44" width="52" height="30" fill="#1f6f43"/><rect x="396" y="44" width="52" height="30" fill="#1f6f43"/>
      </g>
      <!-- phi_b>=0.25 rows (2..7) grey -->
      <g fill="#30363d">
        <rect x="4" y="80" width="52" height="30"/><rect x="60" y="80" width="52" height="30"/><rect x="116" y="80" width="52" height="30"/><rect x="172" y="80" width="52" height="30"/><rect x="228" y="80" width="52" height="30"/><rect x="284" y="80" width="52" height="30"/><rect x="340" y="80" width="52" height="30"/><rect x="396" y="80" width="52" height="30"/>
        <rect x="4" y="116" width="52" height="30"/><rect x="60" y="116" width="52" height="30"/><rect x="116" y="116" width="52" height="30"/><rect x="172" y="116" width="52" height="30"/><rect x="228" y="116" width="52" height="30"/><rect x="284" y="116" width="52" height="30"/><rect x="340" y="116" width="52" height="30"/><rect x="396" y="116" width="52" height="30"/>
        <rect x="4" y="152" width="52" height="30"/><rect x="60" y="152" width="52" height="30"/><rect x="116" y="152" width="52" height="30"/><rect x="172" y="152" width="52" height="30"/><rect x="228" y="152" width="52" height="30"/><rect x="284" y="152" width="52" height="30"/><rect x="340" y="152" width="52" height="30"/><rect x="396" y="152" width="52" height="30"/>
        <rect x="4" y="188" width="52" height="30"/><rect x="60" y="188" width="52" height="30"/><rect x="116" y="188" width="52" height="30"/><rect x="172" y="188" width="52" height="30"/><rect x="228" y="188" width="52" height="30"/><rect x="284" y="188" width="52" height="30"/><rect x="340" y="188" width="52" height="30"/><rect x="396" y="188" width="52" height="30"/>
        <rect x="4" y="224" width="52" height="30"/><rect x="60" y="224" width="52" height="30"/><rect x="116" y="224" width="52" height="30"/><rect x="172" y="224" width="52" height="30"/><rect x="228" y="224" width="52" height="30"/><rect x="284" y="224" width="52" height="30"/><rect x="340" y="224" width="52" height="30"/><rect x="396" y="224" width="52" height="30"/>
        <rect x="4" y="260" width="52" height="30"/><rect x="60" y="260" width="52" height="30"/><rect x="116" y="260" width="52" height="30"/><rect x="172" y="260" width="52" height="30"/><rect x="228" y="260" width="52" height="30"/><rect x="284" y="260" width="52" height="30"/><rect x="340" y="260" width="52" height="30"/><rect x="396" y="260" width="52" height="30"/>
      </g>
      <!-- cell values -->
      <g fill="#e6edf3" font-size="11" text-anchor="middle">
        <text x="30" y="27">.2</text><text x="86" y="27">.2</text><text x="142" y="27">.2</text><text x="198" y="27">.2</text><text x="254" y="27">.2</text><text x="310" y="27">.2</text><text x="366" y="27">.2</text><text x="422" y="27">.2</text>
        <text x="30" y="63">.2</text><text x="86" y="63">.2</text><text x="142" y="63">.2</text><text x="198" y="63">.2</text><text x="254" y="63">.2</text><text x="310" y="63">.2</text><text x="366" y="63">.2</text><text x="422" y="63">.2</text>
      </g>
      <g fill="#6e7681" font-size="11" text-anchor="middle">
        <text x="30" y="99">0</text><text x="86" y="99">0</text><text x="142" y="99">0</text><text x="198" y="99">0</text><text x="254" y="99">0</text><text x="310" y="99">0</text><text x="366" y="99">0</text><text x="422" y="99">0</text>
        <text x="30" y="135">0</text><text x="142" y="135">0</text><text x="254" y="135">0</text><text x="366" y="135">0</text>
        <text x="86" y="171">0</text><text x="198" y="171">0</text><text x="310" y="171">0</text><text x="422" y="171">0</text>
        <text x="30" y="207">0</text><text x="142" y="207">0</text><text x="254" y="207">0</text><text x="366" y="207">0</text>
        <text x="86" y="243">0</text><text x="198" y="243">0</text><text x="310" y="243">0</text><text x="422" y="243">0</text>
        <text x="30" y="279">0</text><text x="142" y="279">0</text><text x="254" y="279">0</text><text x="366" y="279">0</text>
      </g>
    </g>

    <!-- gen-211 face label (phi_b=0 rows) -->
    <rect x="2" y="6" width="450" height="70" fill="none" stroke="#3fb950" stroke-width="2.5" rx="4"/>
    <text x="466" y="30" fill="#3fb950" font-size="12" font-weight="bold">gen-211 PLANE</text>
    <text x="466" y="47" fill="#3fb950" font-size="10.5">phi_b=0 face:</text>
    <text x="466" y="62" fill="#3fb950" font-size="10.5">offset 0.200 for</text>
    <text x="466" y="76" fill="#3fb950" font-size="10.5">ALL phi_c — survives</text>

    <!-- gen-212 diagonal -->
    <line x1="30" y1="23" x2="142" y2="95" stroke="#d29922" stroke-width="2.5" stroke-dasharray="5 3"/>
    <line x1="142" y1="95" x2="422" y2="275" stroke="#d29922" stroke-width="2.5" stroke-dasharray="5 3"/>
    <circle cx="30" cy="23" r="4" fill="#d29922"/><circle cx="142" cy="95" r="4" fill="#d29922"/>
    <text x="466" y="150" fill="#d29922" font-size="12" font-weight="bold">gen-212 DIAGONAL</text>
    <text x="466" y="167" fill="#d29922" font-size="10.5">phi_b=phi_c: crosses</text>
    <text x="466" y="181" fill="#d29922" font-size="10.5">the wall at phi=0.25</text>
    <text x="466" y="195" fill="#d29922" font-size="10.5">(coupled deafness)</text>

    <!-- the vertical wall -->
    <line x1="-30" y1="78" x2="452" y2="78" stroke="#f85149" stroke-width="3"/>
    <text x="466" y="245" fill="#f85149" font-size="12" font-weight="bold">THE WALL</text>
    <text x="466" y="262" fill="#f85149" font-size="10.5">is horizontal here =</text>
    <text x="466" y="276" fill="#f85149" font-size="10.5">a pure phi_b step.</text>
    <text x="466" y="290" fill="#f85149" font-size="10.5">phi_c never moves it.</text>
  </g>

  <!-- bottom takeaway -->
  <text x="430" y="452" fill="#e6edf3" font-size="13.5" text-anchor="middle" font-weight="bold">The cross-term lives entirely on phi_b (bind-deafness). Claim-deafness phi_c is inert —</text>
  <text x="430" y="474" fill="#e6edf3" font-size="13.5" text-anchor="middle" font-weight="bold">the wordnum "three" fixes the claim before "certified" is ever heard.</text>
  <text x="430" y="502" fill="#8b949e" font-size="12" text-anchor="middle">Partial deafness (skim the headline, read carefully at the check) keeps gen-211's plane.</text>
  <text x="430" y="521" fill="#8b949e" font-size="12" text-anchor="middle">gen-212's cross-term is coordinate-dependent, not structural. Charity = bind-legibility.</text>
  <text x="430" y="546" fill="#6e7681" font-size="10.5" text-anchor="middle">Bolt gen-213 · M-NESTOR-0832 · jt-0249 · cross_term_two_gate_over_reach_checker_gen213.py · fish wet</text>
</svg>
