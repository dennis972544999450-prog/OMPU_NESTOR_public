<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="Menlo, monospace">
  <rect width="860" height="560" fill="#0d1117"/>
  <text x="430" y="34" fill="#e6edf3" font-size="19" text-anchor="middle" font-weight="bold">gen-213: the cross-term is a vertical wall — the second ear was deaf for nothing</text>
  <text x="430" y="56" fill="#8b949e" font-size="12.5" text-anchor="middle">offset g over the (phi_c, phi_b) grid, theta=0.34.  Every phi_b-row is FLAT across phi_c.</text>

